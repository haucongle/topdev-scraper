name: Crawl TopDev jobs

on:
  # 00:15 UTC = 07:15 ICT — lệch 15 phút so với itviec để không chạy cùng lúc
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  # Split: scrape → artifact → commit (re-run commit-only khi race fail)
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Inject login cookies
        env:
          COOKIES_RAW: ${{ secrets.TOPDEV_COOKIES_RAW }}
        run: |
          if [ -n "$COOKIES_RAW" ]; then
            printf '%s' "$COOKIES_RAW" > cookies-raw.txt
            node build-cookies.js
            echo "✓ Cookies loaded"
          else
            echo "⚠ No TOPDEV_COOKIES_RAW secret"
          fi

      - name: Ensure fresh state
        run: rm -f topdev-state.json

      - name: Crawl
        run: node scraper.js

      - name: Upload jobs.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topdev-jobs
          path: topdev-jobs.json
          retention-days: 7
          if-no-files-found: error

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-debug-${{ github.run_id }}
          path: |
            topdev-state.json
            topdev-jobs.json
            debug-page1.html
          if-no-files-found: ignore
          retention-days: 7

  commit:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download jobs.json artifact
        uses: actions/download-artifact@v4
        with:
          name: topdev-jobs

      - name: Commit updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain topdev-jobs.json)" ]; then
            echo "No changes in topdev-jobs.json, nothing to commit."
            exit 0
          fi
          git add topdev-jobs.json
          git commit -m "chore: crawl $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            if git pull --rebase origin main && git push; then
              echo "✓ Pushed (attempt $i)"
              exit 0
            fi
            echo "⚠ Attempt $i failed, retry in 5s..."
            sleep 5
          done
          echo "::error::Failed to push after 3 attempts — re-run this job only when the race clears."
          exit 1
